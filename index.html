<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gigo</title>
    <meta name="theme-color" content="#f6edf3">
    <link rel="icon" type="image/png" sizes="32x32" href="./apps/home/assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./apps/home/assets/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apps/home/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">


    <script src="./apps/home/js/tailwind.js"></script>

    <script>document.documentElement.classList.add('love-loading-pending');</script>
    <link rel="stylesheet" href="./apps/load/loading.css?v=load-4">
    <link rel="stylesheet" href="./apps/home/style.css?v=home-bg-restore-1">
    <script type="module" src="./apps/load/boot.js?v=load-4"></script>
</head>

<body>

    <!-- AI 聊天机器人入口按钮 -->
    <a href="./apps/chat/" class="ai-chat-btn hidden" title="和 Gogo 的小分身聊天" id="ai-chat-entry">
        <img src="./apps/home/assets/background/bubu1.jpg" alt="Gogo">
    </a>
    

    <!-- Login Page -->
    <div id="page-auth" class="relative z-10 flex flex-col items-center justify-center app-screen w-full px-6 hidden">
        <div class="glass login-card p-8 rounded-3xl w-full max-w-sm fade-in relative">
            <h1 class="text-3xl text-white mb-2 text-center tracking-widest drop-shadow-lg">Gogo&Gigi</h1>
            <p class="text-xs text-gray-400 mb-4 text-center">Since 2025.05.22</p>

            <div id="login-password-group" class="space-y-4">
                <div class="login-identity-group" role="radiogroup" aria-label="选择登录身份">
                    <label id="identity-gogo-option" class="identity-choice">
                        <input type="radio" name="login-identity" value="lrx"
                            onchange="window.app.selectLoginIdentity('gogo')">
                        <span class="identity-dot"></span>
                        <span>我是 Gogo</span>
                    </label>
                    <label id="identity-gigi-option" class="identity-choice active">
                        <input type="radio" name="login-identity" value="zjt" checked
                            onchange="window.app.selectLoginIdentity('gigi')">
                        <span class="identity-dot"></span>
                        <span>我是 Gigi</span>
                    </label>
                </div>
                <input type="hidden" id="input-username" value="zjt">
                <input type="password" id="input-password" value="20250522" placeholder="密码"
                    class="input-field login-password-field" autocomplete="current-password">
                <button onclick="window.app.loginWithPassword()" class="btn-primary">登录</button>
            </div>
        </div>
    </div>

    <!-- Main Page -->
    <div id="page-main" class="relative z-10 app-screen w-full flex flex-col hidden fade-in">


        <!-- Header -->
        <div class="home-top-area z-20 flex-none">
            <div class="home-top-panel">
                <!-- Row 1: Anniversary -->
                <div id="home-timer-row" class="home-timer-row">
                    <div class="home-timer-copy">
                        <span>我们已经在一起</span>
                        <strong class="home-timer-days" onclick="window.app.openLetter()"
                            onkeydown="if(event.key === 'Enter' || event.key === ' ') { event.preventDefault(); window.app.openLetter(); }"
                            role="link" tabindex="0"
                            aria-label="打开给 Gigi 的信" title="给 Gigi 的信">
                            <span id="timer-days">0</span><small>天</small>
                        </strong>
                    </div>
                    <div class="home-timer-clock">
                        <div class="flex items-center flip-clock-container" id="flip-clock">
                            <div class="flip-unit">
                                <div class="flex">
                                    <div class="flip-card" id="hour-tens">0</div>
                                    <div class="flip-card" id="hour-ones">0</div>
                                </div>
                                <span class="flip-label">时</span>
                            </div>
                            <span class="home-time-separator">:</span>
                            <div class="flip-unit">
                                <div class="flex">
                                    <div class="flip-card" id="min-tens">0</div>
                                    <div class="flip-card" id="min-ones">0</div>
                                </div>
                                <span class="flip-label">分</span>
                            </div>
                            <span class="home-time-separator">:</span>
                            <div class="flip-unit">
                                <div class="flex">
                                    <div class="flip-card" id="sec-tens">0</div>
                                    <div class="flip-card" id="sec-ones">0</div>
                                </div>
                                <span class="flip-label">秒</span>
                            </div>
                        </div>
                        <span class="home-timer-suffix">啦</span>
                    </div>
                </div>
                <!-- Row 2: Tabs -->
                <div class="home-nav-row">
                    <div class="flex-1">
                        <div id="tab-grid-main" class="home-tabs hidden fade-in">
                        <button onclick="window.app.switchTab('timeline')" id="tab-btn-timeline"
                            class="home-tab is-active">时光</button>
                        <button onclick="window.app.openCalendar()" id="tab-btn-calendar-grid"
                            class="home-tab">月历</button>
                        <button onclick="window.app.openAlbum()" id="tab-btn-album"
                            class="home-tab">回忆</button>
                        </div>

                        <div id="tab-grid-extra" class="home-extra-menu hidden fade-in">
                        <button onclick="window.app.openXiaobenben()" id="tab-btn-xiaobenben"
                            class="home-extra-tab">小笨笨</button>
                        <button onclick="window.app.openStore()" id="tab-btn-store"
                            class="home-extra-tab">商店</button>
                        <button onclick="window.app.openWheel()" id="tab-btn-wheel"
                            class="home-extra-tab">转盘</button>
                        <button onclick="window.app.openMenu()" id="tab-btn-menu"
                            class="home-extra-tab">菜单</button>
                        <button onclick="window.app.logout()" id="tab-btn-logout" class="home-extra-tab is-danger">&#36864;&#20986;</button>
                        </div>
                    </div>
                    <button onclick="window.app.toggleTabMenu()" id="tab-menu-toggle" aria-expanded="false"
                        class="home-menu-toggle">
                        ...
                    </button>
                </div>
            </div>
        </div>

        <!-- 1. Timeline View (原列表视图) -->
        <div id="view-timeline" class="timeline-frame flex-1 overflow-y-auto p-4 pb-32 space-y-4 scroll-smooth">
            <!-- Check-in Card -->
            <div id="checkin-box"
                class="hidden glass p-4 rounded-2xl flex justify-between items-center bg-gradient-to-r from-pink-500/20 to-purple-500/20 border-pink-400/30 transform hover:scale-[1.02] transition-transform">
                <div>
                    <h3 class="text-lg text-pink-200">✨ 今日签到</h3>
                    <p class="text-xs text-gray-400">点亮今天，熊熊币+10</p>
                </div>
                <button onclick="window.app.doCheckIn()"
                    class="bg-pink-500 text-white px-4 py-2 rounded-xl text-sm shadow hover:scale-105 transition">签到</button>
            </div>

            <!-- Events List -->
            <div id="events-container" class="space-y-4">
                <!-- Events will be loaded here -->
            </div>
        </div>

        <!-- Footer / Input (支持 pb-safe) -->
        <div id="timeline-composer" class="absolute bottom-0 left-0 right-0 z-30 pb-safe glass border-t border-white/10">
            <div class="p-4 pt-2 relative">
                <!-- Mood Panel (Popup) -->
                <div id="mood-panel"
                    class="hidden absolute bottom-full right-4 mb-2 glass p-3 rounded-xl flex gap-3 fade-in">
                    <button onclick="window.app.sendSOS('angry')" class="text-2xl hover:scale-125 transition"
                        title="生气/炸毛">😡</button>
                    <button onclick="window.app.sendSOS('sad')" class="text-2xl hover:scale-125 transition"
                        title="难过/委屈">😭</button>
                    <button onclick="window.app.sendSOS('sos')" class="text-2xl hover:scale-125 transition"
                        title="紧急求救">🆘</button>
                </div>

                <div id="quote-bar" class="hidden flex items-center gap-2 bg-pink-500/10 border-l-4 border-pink-400 rounded-lg px-3 py-1.5 mb-1">
                    <span id="quote-text" class="flex-1 text-xs text-pink-200 truncate"></span>
                    <button onclick="window.app.clearQuote()" class="text-gray-400 hover:text-white text-sm">✕</button>
                </div>

                <div class="flex gap-2 items-center">
                    <button onclick="window.app.toggleMoodPanel()"
                        class="text-gray-400 hover:text-pink-400 transition px-1">
                        😤
                    </button>
                    <input id="new-diary" type="text" placeholder="记录此刻的心情..."
                        class="flex-1 bg-black/30 border border-white/10 text-white placeholder-gray-500 outline-none text-sm p-3 rounded-xl focus:border-pink-400 transition-colors">
                    <button onclick="window.app.sendDiary()" id="diary-send-btn"
                        class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition flex-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13a1 1 0 102 0V9.414l1.293 1.293a1 1 0 001.414-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入主程序 (Module) -->
    <script src="./apps/home/js/supabase-js@2.js"></script>
    <script type="module" src="./apps/home/script.js?v=home-modules-9"></script>
</body>

</html>
