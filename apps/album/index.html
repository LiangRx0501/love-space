<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>香布布和凑一二的回忆</title>
    <script>document.documentElement.classList.add('love-loading-pending');</script>
    <link rel="stylesheet" href="../load/loading.css?v=load-4">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="../load/boot.js?v=load-4"></script>
    <script defer src="../home/js/supabase-js@2.js"></script>
</head>

<body>
    <a href="../../" class="back-home-btn" title="返回主页" aria-label="返回主页">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
    </a>

    <main class="album-page">
        <section class="album-shell">
            <header class="album-header">
                <div class="album-title-row">
                    <div>
                        <h1>香Gogo和凑Gigi的回忆</h1>
                    </div>
                    <button id="open-upload" class="upload-entry-btn" type="button">上传</button>
                </div>

            </header>

            <div id="login-hint" class="login-hint hidden">
                当前没有可用登录态，正在返回主页登录...
            </div>

            <section class="photo-wall-section">
                <div id="recent-list" class="photo-wall"></div>
            </section>
        </section>
    </main>

    <button id="floating-upload" class="floating-upload" type="button" aria-label="上传照片">+</button>

    <div id="upload-modal" class="upload-modal hidden" role="dialog" aria-modal="true" aria-labelledby="upload-title">
        <button id="modal-backdrop" class="modal-backdrop" type="button" aria-label="关闭上传"></button>
        <section class="upload-sheet">
            <div class="sheet-handle"></div>
            <div class="upload-head">
                <div>
                    <h2 id="upload-title">上传照片</h2>
                    <p id="author-badge" class="author-badge">未登录</p>
                </div>
                <button id="close-upload" class="close-btn" type="button" aria-label="关闭">×</button>
            </div>

            <form id="album-form" class="album-form">
                <label class="file-picker">
                    <input id="photo-file" type="file" accept="image/*" required>
                    <span>选择图片</span>
                </label>

                <div id="preview-card" class="preview-card">
                    <img id="preview-image" alt="预览图片" hidden>
                    <div id="preview-placeholder" class="preview-placeholder">图片预览</div>
                </div>

                <label class="field">
                    <span>时间</span>
                    <input id="shot-date" type="date" required>
                </label>

                <label class="field">
                    <span>文案</span>
                    <textarea id="caption" rows="3" maxlength="120" placeholder="说啥好呢..." required></textarea>
                    <small><span id="caption-count">0</span>/120</small>
                </label>
            </form>

            <div id="preview-meta" class="preview-meta">
                <span id="preview-date">2026.04.08</span>
                <p id="preview-caption">这里会显示你的文字描述。</p>
            </div>

            <div id="submit-status" class="submit-status">等待保存</div>
            <button id="publish-btn" class="publish-btn" type="button">保存到相册</button>
        </section>
    </div>

    <script type="module" src="album.js?v=load-4"></script>
</body>

</html>
