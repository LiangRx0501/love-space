<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小笨笨</title>
    <script>document.documentElement.classList.add('love-loading-pending');</script>
    <link rel="stylesheet" href="../load/loading.css?v=load-4">

    <script type="module" src="../load/boot.js?v=load-4"></script>

<body>

            <a href="../../" class="back-home-btn" title="返回主页" aria-label="返回主页">

        <section class="notes-sheet">

                <span class="check-circle placeholder-circle"></span>
