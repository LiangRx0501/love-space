<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gigo 月历</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../home/assets/icons/favicon-32.png">
    <script src="../home/js/tailwind.js"></script>
    <script>document.documentElement.classList.add('love-loading-pending');</script>
    <link rel="stylesheet" href="../load/loading.css?v=load-4">
    <link rel="stylesheet" href="./style.css?v=calendar-module-2">
    <script type="module" src="../load/boot.js?v=load-4"></script>
</head>

<body>
    <main class="calendar-page relative z-10 w-full flex flex-col fade-in">
        <div id="view-calendar-grid" class="calendar-frame flex-1 overflow-y-auto p-4 pb-32">
            <a href="../../" class="calendar-home-btn" aria-label="返回主页" title="返回主页">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
            </a>
            <div class="calendar-card">
                <div class="calendar-heading">
                    <button onclick="window.app.changeMonth(-1)" class="calendar-nav-button">&lt;</button>
                    <span id="calendar-month-title" class="calendar-title">2025年2月</span>
                    <button onclick="window.app.changeMonth(1)" class="calendar-nav-button">&gt;</button>
                </div>
                <div class="calendar-weekdays grid grid-cols-7 gap-2 text-center text-xs">
                    <div>日</div>
                    <div>一</div>
                    <div>二</div>
                    <div>三</div>
                    <div>四</div>
                    <div>五</div>
                    <div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center"></div>
            </div>
        </div>
    </main>

    <div id="date-modal" class="fixed inset-0 z-50 hidden">
        <div class="date-modal-backdrop" onclick="window.app.closeDateModal()"></div>
        <div class="date-modal-sheet pb-safe animate-[fadeIn_0.3s_ease-out]">
            <div class="w-12 h-1 bg-gray-500/50 rounded-full mx-auto mb-3"></div>
            <h3 id="modal-date-title" class="text-lg font-bold text-pink-500 mb-3 text-center"></h3>
            <div id="modal-events-list" class="max-h-[40vh] overflow-y-auto space-y-2 mb-3"></div>
            <button id="schedule-add-btn" onclick="window.app.toggleScheduleForm()"
                class="w-full py-2.5 rounded-xl border border-dashed border-pink-500/40 text-pink-500 text-sm font-bold bg-white/45 hover:bg-pink-500/10 transition mb-3">
                ➕ 添加日程
            </button>
            <div id="schedule-add-form" class="hidden space-y-3 mb-3 p-3 rounded-xl bg-white/50 border border-white/70">
                <input id="schedule-title" type="text" placeholder="日程内容..."
                    class="soft-input w-full text-sm p-2.5 placeholder-stone-400 focus:border-pink-400 transition">
                <div class="flex gap-2">
                    <select id="schedule-label" class="soft-input flex-1 text-sm p-2.5">
                        <option value="date">💕 约会</option>
                        <option value="anniversary">💛 纪念日</option>
                        <option value="todo">📋 待办</option>
                        <option value="reminder">🔔 提醒</option>
                    </select>
                    <button onclick="window.app.addSchedule()"
                        class="px-5 py-2.5 rounded-xl bg-pink-500 text-white text-sm font-bold shadow active:scale-95 transition">
                        添加
                    </button>
                </div>
            </div>
            <div class="text-center">
                <button onclick="window.app.closeDateModal()" class="text-stone-500 text-sm hover:text-pink-500">关闭</button>
            </div>
        </div>
    </div>

    <script src="../home/js/supabase-js@2.js"></script>
    <script type="module" src="./script.js?v=calendar-module-6"></script>
</body>

</html>
